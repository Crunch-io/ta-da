{{ partial "head.html" . }}

{{ partial "header.html" . }}

<div id="page-content-wrapper">
    <div class="container-fluid">

        <div class="intro-content">
            <div class="jumbotron jumbotron-secondary-pages">
                <div class="container">
                    <div class="row justify-content-md-center">
                            <div class="col-md-5 text-center">
                                <h1>{{ .Params.title }}</h1>
                                <h2>{{ .Description }}</h2>
                            </div>
                    </div> <!-- /.row -->
                </div> <!-- /.container -->
            </div> <!-- /.jumbotron -->
        </div> <!-- /.intro-content -->
    </div>
</div>

<div id="wrapper">

    <div id="secondary-pages-wrapper">
        <div class="container-fluid">

            <div class="container">
                <div class="row spacer share-insights">
                    <div class="col-12 col-md-5 order-1 order-md-0">
                        <h2 class="label">{{ .Params.label }}</h2>
                        <h2 class="secondary-title">{{ .Params.subtitle }}</h2>

                        <p>{{ .Content }}</p>

                        <button type="button" class="btn btn-success" onclick="window.location.href='/request-demo'">Learn more</button>
                    </div>

                    <div class="col-12 col-md-6 offset-md-1 order-1 order-md-1 spacer-top-mb">
                        <img src="{{ .Params.img }}" alt="Webinar Recording" class="img-fluid sp-mb-t">
                    </div>

                </div> <!-- /.row. -->
            </div> <!-- /.container -->

{{ partial "footer-nav.html" . }}

{{ partial "footer.html" . }}
